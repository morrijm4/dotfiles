unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# open new panes in the current pane's directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# open a new window running Claude Code, in the current pane's directory
bind C new-window -c "#{pane_current_path}" "claude"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-style copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Catppuccin Macchiato status bar
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"

# palette
set -g @base "#24273a"
set -g @mantle "#1e2030"
set -g @surface0 "#363a4f"
set -g @surface1 "#494d64"
set -g @text "#cad3f5"
set -g @subtext0 "#a5adcb"
set -g @blue "#8aadf4"
set -g @mauve "#c6a0f6"
set -g @green "#a6da95"
set -g @overlay0 "#6e738d"

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#{@mantle},fg=#{@text}"
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[bg=#{@blue},fg=#{@base},bold] #S #[bg=#{@mantle},fg=#{@mantle}] "
set -g status-right "#[fg=#{@subtext0}] %Y-%m-%d #[fg=#{@overlay0}]│#[fg=#{@subtext0}] %H:%M #[bg=#{@blue},fg=#{@base},bold] #h "

setw -g window-status-format "#[bg=#{@surface0},fg=#{@subtext0}] #I #W#{?window_zoomed_flag, Z,} "
setw -g window-status-current-format "#[bg=#{@mauve},fg=#{@base},bold] #I #W#{?window_zoomed_flag, Z,} "
setw -g window-status-separator ""

set -g pane-border-style "fg=#{@surface0}"
set -g pane-active-border-style "fg=#{@blue}"
set -g message-style "bg=#{@surface0},fg=#{@text}"
set -g mode-style "bg=#{@surface1},fg=#{@text}"
